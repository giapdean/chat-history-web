<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat History - Vercel Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-bubble-user { background-color: #0084ff; color: white; border-radius: 18px 18px 0 18px; }
        .chat-bubble-ai { background-color: #e4e6eb; color: #050505; border-radius: 18px 18px 18px 0; }
        .sidebar-item:hover { background-color: #f3f4f6; }
        .sidebar-item.active { background-color: #e5e7eb; border-left: 4px solid #0084ff; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <div class="w-full md:w-80 bg-white border-r flex flex-col h-full shrink-0 transition-all duration-300" id="sidebar">
        <div class="p-4 border-b bg-blue-600 text-white flex justify-between items-center">
            <h1 class="font-bold text-lg"><i class="fas fa-clock-rotate-left mr-2"></i> Lịch sử Chat</h1>
            <button onclick="fetchData()" class="p-2 hover:bg-blue-700 rounded-full transition-colors">
                <i class="fas fa-sync-alt" id="sync-icon"></i>
            </button>
        </div>
        <div id="session-list" class="flex-1 overflow-y-auto p-2 space-y-2">
            <div class="p-8 text-center text-gray-400">Đang tải dữ liệu...</div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col h-full bg-white relative">
        <div id="chat-header" class="p-4 border-b flex items-center shadow-sm bg-white sticky top-0 z-10">
            <button onclick="toggleSidebar()" class="md:hidden mr-4 text-gray-600">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mr-3">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <div class="overflow-hidden">
                <h2 id="current-title" class="font-bold text-gray-800 truncate">Chọn hội thoại</h2>
                <p id="current-time" class="text-xs text-gray-500">Bắt đầu theo dõi lịch sử của bạn</p>
            </div>
        </div>

        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50">
            <div class="h-full flex flex-col items-center justify-center text-gray-400">
                <i class="fas fa-comments text-6xl mb-4 opacity-10"></i>
                <p>Nội dung sẽ hiển thị tại đây</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxQDnKi3UgHo7L-kdY58y6B3v0fn2g_EoXB82bwKgFhRyFQ47M7NZUXQuaK2YVf_Jpc/exec?type=json';
        let chatData = [];

        async function fetchData() {
            const syncIcon = document.getElementById('sync-icon');
            syncIcon.classList.add('fa-spin');
            
            try {
                const response = await fetch(API_URL);
                chatData = await response.json();
                renderSessionList();
            } catch (error) {
                console.error('Lỗi fetch:', error);
                document.getElementById('session-list').innerHTML = 
                    '<div class="p-8 text-center text-red-500 text-sm">Không thể tải dữ liệu. Hãy thử lại.</div>';
            } finally {
                syncIcon.classList.remove('fa-spin');
            }
        }

        function renderSessionList() {
            const sessionList = document.getElementById('session-list');
            sessionList.innerHTML = '';

            if (chatData.length === 0) {
                sessionList.innerHTML = '<div class="p-8 text-center text-gray-400">Không tìm thấy dữ liệu</div>';
                return;
            }

            chatData.forEach((chat, index) => {
                const div = document.createElement('div');
                div.className = `sidebar-item p-3 cursor-pointer rounded-lg transition-all border border-transparent`;
                div.id = `item-${index}`;
                div.onclick = () => selectSession(index);
                
                div.innerHTML = `
                    <div class="font-medium text-gray-800 truncate">${chat.Title || 'Không tiêu đề'}</div>
                    <div class="text-xs text-gray-500 mt-1">${chat.Created || ''}</div>
                `;
                sessionList.appendChild(div);
            });
        }

        function selectSession(index) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${index}`).classList.add('active');

            const chat = chatData[index];
            document.getElementById('current-title').innerText = chat.Title || 'Không tiêu đề';
            document.getElementById('current-time').innerText = `Tạo ngày: ${chat.Created || 'N/A'}`;

            const container = document.getElementById('chat-container');
            container.innerHTML = '';

            if (chat.History && Array.isArray(chat.History)) {
                chat.History.forEach(msg => {
                    if (msg.content) appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content);
                });
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            } else {
                container.innerHTML = '<div class="h-full flex items-center justify-center text-gray-400">Không có dữ liệu tin nhắn</div>';
            }
            
            if (window.innerWidth < 768) toggleSidebar();
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chat-container');
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            wrapper.innerHTML = `
                <div class="max-w-[85%] p-3 shadow-sm ${role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'}">
                    <div class="text-[15px] leading-relaxed whitespace-pre-wrap">${text}</div>
                </div>
            `;
            container.appendChild(wrapper);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
            } else {
                sidebar.classList.add('hidden');
            }
        }

        // Khởi tạo
        fetchData();
    </script>
</body>
</html>
